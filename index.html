<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  body { font-family: 'Orbitron', monospace; touch-action: none; user-select: none; -webkit-user-select: none; }
  #gameCanvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #loading {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #000; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 999; gap: 16px;
  }
  #loading-text { color: #00f0ff; font-size: 14px; letter-spacing: 3px; font-family: monospace; }
  #loading-bar-wrap { width: 160px; height: 4px; background: rgba(0,240,255,0.2); border-radius: 2px; }
  #loading-bar { height: 100%; width: 0%; background: #00f0ff; border-radius: 2px; transition: width 0.3s; box-shadow: 0 0 8px #00f0ff; }
  #hud { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; display: none; }
  #health-container { position: absolute; top: 18px; left: 18px; display: flex; align-items: center; gap: 10px; }
  #health-bar-wrap { width: 140px; height: 16px; background: rgba(0,240,255,0.15); border-radius: 8px; border: 1px solid #00f0ff55; overflow: hidden; }
  #health-bar { height: 100%; background: linear-gradient(90deg,#00ff88,#00f0ff); width: 100%; transition: width 0.3s; }
  #score-display { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 28px; font-weight: 900; text-shadow: 0 0 20px #00f0ff; letter-spacing: 4px; }
  #joystick-area { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; pointer-events: all; }
  #joystick-base { width: 120px; height: 120px; border-radius: 50%; background: rgba(0,240,255,0.1); border: 2px solid rgba(0,240,255,0.4); position: relative; }
  #joystick-knob { width: 48px; height: 48px; border-radius: 50%; background: #00f0ff; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 15px #00f0ff; }
  #overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,5,20,0.95); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100; gap: 20px;
  }
  #overlay h1 { font-size: 36px; color: #00f0ff; text-shadow: 0 0 30px #00f0ff; text-align: center; }
  #start-btn {
    padding: 16px 56px; background: transparent; border: 2px solid #00f0ff;
    color: #00f0ff; font-family: 'Orbitron'; font-size: 16px; cursor: pointer;
  }
</style>
</head>
<body>

<div id="loading">
  <div id="loading-text">YUKLANMOQDA...</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div id="health-container">
    <div id="health-bar-wrap"><div id="health-bar"></div></div>
  </div>
  <div id="score-display">0</div>
  <div id="joystick-area">
    <div id="joystick-base"><div id="joystick-knob"></div></div>
  </div>
</div>

<div id="overlay" style="display:none">
  <h1>NEON<br>RUNNER</h1>
  <p id="final-score" style="color:white; display:none;"></p>
  <button id="start-btn">BOSHLASH</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  let scene, camera, renderer, road, character, ufo;
  let obstacles = [], buildings = [], flyers = [];
  let gameRunning = false, score = 0, health = 100, spd = 0.4;
  let targetX = 0, playerX = 0, frameCount = 0;

  const canvas = document.getElementById('gameCanvas');
  const hud = document.getElementById('hud');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('start-btn');
  const healthBar = document.getElementById('health-bar');
  const scoreEl = document.getElementById('score-display');

  // Yuklash jarayoni simulyatsiyasi
  window.onload = () => {
    let bar = document.getElementById('loading-bar');
    let p = 0;
    let iv = setInterval(() => {
      p += 10;
      bar.style.width = p + '%';
      if(p >= 100) {
        clearInterval(iv);
        document.getElementById('loading').style.display = 'none';
        overlay.style.display = 'flex';
        initEngine();
      }
    }, 100);
  };

  function initEngine() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020818);
    scene.fog = new THREE.Fog(0x020818, 20, 100);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    const light = new THREE.DirectionalLight(0x00f0ff, 1);
    light.position.set(0, 10, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // Doimiy yo'l
    const roadGeo = new THREE.PlaneGeometry(10, 2000);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x050510 });
    road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    scene.add(road);

    animate();
  }

  function createCharacter() {
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.4), new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true }));
    body.position.y = 0.6;
    g.add(body);
    scene.add(g);
    return g;
  }

  function spawnObstacle(z) {
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshBasicMaterial({ color: 0xff0055 }));
    mesh.position.set((Math.random() - 0.5) * 6, 0.5, z);
    scene.add(mesh);
    obstacles.push(mesh);
  }

  function initGame() {
    // Tozalash
    obstacles.forEach(o => scene.remove(o));
    obstacles = [];
    score = 0; health = 100; spd = 0.4; frameCount = 0;
    
    if (character) scene.remove(character);
    character = createCharacter();
    
    camera.position.set(0, 3, 10);
    character.position.set(0, 0, 5);

    overlay.style.display = 'none';
    hud.style.display = 'block';
    gameRunning = true;
  }

  // Joystick logikasi
  let joystickDX = 0;
  const knob = document.getElementById('joystick-knob');
  document.getElementById('joystick-area').addEventListener('touchmove', (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = e.touches[0].clientX - (rect.left + rect.width/2);
    joystickDX = Math.max(-1, Math.min(1, x / 40));
    knob.style.left = (50 + joystickDX * 30) + '%';
  });
  document.getElementById('joystick-area').addEventListener('touchend', () => {
    joystickDX = 0;
    knob.style.left = '50%';
  });

  function animate() {
    requestAnimationFrame(animate);
    if (!gameRunning) {
      renderer.render(scene, camera);
      return;
    }

    frameCount++;
    score += 0.1;
    scoreEl.textContent = Math.floor(score);

    // Harakat
    playerX += joystickDX * 0.15;
    playerX = Math.max(-4, Math.min(4, playerX));
    character.position.x = playerX;

    // Kamera qahramonni kuzatadi
    camera.position.z -= spd;
    character.position.z = camera.position.z - 5; // Qahramon kamera oldida
    camera.lookAt(character.position.x, 1, character.position.z - 5);

    // Yo'lni qahramon bilan birga surish (cheksiz yo'l effekti)
    road.position.z = character.position.z - 500;

    // To'siqlar yaratish
    if (frameCount % 60 === 0) {
      spawnObstacle(character.position.z - 50);
    }

    // To'qnashuvni tekshirish
    obstacles.forEach((o, index) => {
      if (Math.abs(o.position.z - character.position.z) < 1 && Math.abs(o.position.x - character.position.x) < 0.8) {
        health -= 10;
        scene.remove(o);
        obstacles.splice(index, 1);
        healthBar.style.width = health + '%';
        if (health <= 0) {
          gameRunning = false;
          overlay.style.display = 'flex';
          document.getElementById('final-score').style.display = 'block';
          document.getElementById('final-score').textContent = "BALL: " + Math.floor(score);
          startBtn.textContent = "QAYTA BOSHLASH";
        }
      }
    });

    renderer.render(scene, camera);
  }

  startBtn.onclick = initGame;
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
